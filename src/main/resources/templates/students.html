<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Danh Sach Sinh Vien</title>
    <link rel="stylesheet" th:href="@{/style.css}" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <form action="/students" method="GET" class="form-container">
      <input class="form-control" type="text" name="keyword" placeholder="Nhập tên sinh viên cần tìm kiếm" aria-label="default input example">
      <button type="submit" class="btn btn-primary">Tìm kiếm</button>
    </form>
    <div class="d-flex justify-content-between ">
        <h1>Danh Sach Sinh Vien (SSR)</h1>
        <button type="button" class="btn btn-primary"><a th:href="@{/students/add}" style="color: white; text-decoration: none;">Thêm Sinh Viên</a></button>
    </div>
    
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Ho va Ten</th>
          <th>Email</th>
          <th>Tuoi</th>
          <th>Action</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="student : ${dsSinhVien}">
          <td th:text="${student.id}">ID Mau</td>
          <td th:text="${student.name}">Ten Mau</td>
          <td th:text="${student.email}">Email Mau</td>
          <td th:text="${student.age}">0</td>
          <td> <button type="button" class="btn btn-primary"><a th:href="@{/students/}+${student.id}" style="color: white; text-decoration: none;">Xem chi tiết</a></button></td>
          <td> <button type="button" class="btn btn-primary"><a th:href="@{/students/edit/}+${student.id}" style="color: white; text-decoration: none;">Chỉnh sửa</a></button></td>
        </tr>
      </tbody>
    </table>
  </body>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
</html>
