<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Info</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" th:href="@{/style.css}" />
</head>

<body>
    <h1 style="align-self: center;">Thông tin chi tiết</h1>
    <div class="container-detail">
        <div class="w-100 d-flex flex-column gap-3">
            <div class="d-flex justify-content-between">
                <div class="d-flex flex-column gap-1">
                    <span>Id Student</span>
                    <div class="container-info">
                        <span th:text="${student.id}">Id Student</span>
                    </div>
                </div>
                <div class="d-flex flex-column gap-1">
                    <span>Name Student</span>
                    <div class="container-info">
                        <span th:text="${student.name}">Name Student</span>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-between">
                <div class="d-flex flex-column gap-1">
                    <span>Email Student</span>
                    <div class="container-info">
                        <span th:text="${student.email}">Email Student</span>
                    </div>
                </div>
                <div class="d-flex flex-column gap-1">
                    <span>Age Student</span>
                    <div class="container-info">
                        <span th:text="${student.age}">Age Student</span>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-between">
                <div class="d-flex flex-column gap-1">
                    <button type="button" class="btn btn-primary"><a th:href="@{/students/edit/}+${student.id}"
                            style="color: white; text-decoration: none;">Chỉnh sửa</a></button>
                </div>
                <div class="d-flex flex-column gap-1">
                    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
                        Xóa thông tin
                    </button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Bạn có chắc chắn muốn xóa thông tin của sinh viên này?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary"><a th:href="@{/students/delete/}+${student.id}"
                            style="color: white; text-decoration: none;">Xác nhận</a></button>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</html>
